name: verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: verification/requirements.txt

      - name: Cache JPL ephemeris (de421.bsp)
        uses: actions/cache@v4
        with:
          path: verification/de421.bsp
          key: de421-bsp

      # actions/cache saves even when later steps fail — a truncated download
      # would poison the cache permanently. Drop any corrupt file up front.
      - name: Validate cached ephemeris integrity
        run: |
          if [ -f verification/de421.bsp ] && [ "$(stat -c%s verification/de421.bsp)" -ne 16788480 ]; then
            echo "de421.bsp corrupt ($(stat -c%s verification/de421.bsp) bytes) — removing"
            rm -f verification/de421.bsp
          fi

      - name: Install skyfield
        run: pip install -r verification/requirements.txt

      - name: Appendix A tables (JPL parameters, stdlib only)
        run: python verification/verify_tables.py

      - name: 400-yr aphelion clustering simulation (stdlib only)
        run: python verification/aphelion_sim.py

      - name: Solar-term timing vs JPL DE421 ephemeris (fails if > 30 min)
        run: python verification/ephemeris_check.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Build site
        run: |
          npm ci
          npm run build
